name: Build Linux AppImage

# Produces the Linux AppImage on a real Linux runner (the launcher is released
# from a Windows machine, which can't build it) and attaches it — plus the
# latest-linux.yml auto-update metadata — to the GitHub release.
#
# Fires automatically when a release is published (the moment `npm run release`
# flips the draft public), and can be run by hand from the Actions tab for any
# existing tag.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write   # lets electron-builder upload assets to the release

jobs:
  appimage:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run icons

      # Build the AppImage. --publish always makes electron-builder also emit
      # dist/latest-linux.yml (the auto-update feed). It won't upload to an
      # already-published release itself (its default publish type is draft,
      # which it deems "incompatible" with a published release), so the upload
      # is done explicitly below — that keeps the Windows draft-based release
      # flow (npm run release + publish-release.js) untouched.
      - name: Build AppImage
        run: npx electron-builder --linux AppImage --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach AppImage to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="v$(node -p "require('./package.json').version")"
          fi
          echo "Attaching Linux assets to $TAG"
          gh release upload "$TAG" dist/*.AppImage --clobber --repo "$GITHUB_REPOSITORY"
          if [ -f dist/latest-linux.yml ]; then
            gh release upload "$TAG" dist/latest-linux.yml --clobber --repo "$GITHUB_REPOSITORY"
          fi
